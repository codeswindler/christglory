kind = "web"
previewPath = "/"
title = "Choice Networks Church System"
version = "1.0.0"
id = "artifacts/church-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23593

[services.development]
run = "pnpm --filter @workspace/church-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/church-website", "run", "build" ]
publicDir = "artifacts/church-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23593"
BASE_PATH = "/"
